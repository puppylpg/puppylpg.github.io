<svg xmlns="http://www.w3.org/2000/svg" width="736" height="545" viewBox="0 0 736 545" role="img" aria-labelledby="title desc">
  <title id="title">主流大模型 API 价格分布，对数坐标</title>
  <desc id="desc">横轴为输入价格，纵轴为输出价格，单位是美元每百万 token。对数坐标让低价模型之间的差距更容易看清。</desc>
